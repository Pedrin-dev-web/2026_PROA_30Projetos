<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title> Card com Animação Flip</title>
    <link rel="stylesheet" href="./css/style.css">
   </head>
<body>
  <div class="wrapper">
    <div class="flip-card">
      <div class="front card">
        <span class="circle"></span>
        <span class="triangle"></span>
        <span class="square"></span>
      </div>
      <div class="back card">
        <span class="home-logo">
          <span class="icon"></span>
        </span>
        <span class="num">Olá, Seja bem-vindo ao meu portfólio</span>
      </div>
    </div>
  </div>

</body>
</html>
